name: CI

on:
  push:
    branches:
      - main
      - v0.2-dev
      - "v0.2-dev/**"
  pull_request:
    branches:
      - main
      - v0.2-dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: build-linux (self-hosted)
    runs-on: [self-hosted, linux, skynet]

    env:
      TF_NETWORK_TESTS: "0"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache FetchContent downloaded sources across runs (ftxui, gtest,
      # nlohmann_json, cpp-httplib). On a self-hosted runner the disk persists
      # across runs anyway, so this is mostly a safety net for cleanup events.
      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-fetchcontent-

      # System build deps are installed by the runner host's owner via
      # `sudo apt install build-essential cmake git curl pkg-config
      # libsodium-dev libcurl4-openssl-dev libssl-dev libsqlcipher-dev`.
      # We don't apt-install here (runner user has no passwordless sudo).
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        # -j 1 (serial) to prevent OOM-killer from picking off the runner agent
        # on the 3.8 GiB Debian VM. Two parallel TUs (FTXUI / cpp-httplib /
        # gtest) can each spike ~1 GB and starve the runner. Trade-off: build
        # is slow (~30-40 min cold). Revisit -j 2 once VM RAM is raised to 6+ GB.
        run: cmake --build build --config Release -j 1

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload test log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-linux
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # Phase 6: coverage gate.
      #
      # Builds the project a second time in a separate directory
      # (build-cov/) with TF_COVERAGE=ON so the Release artefacts above
      # remain shippable (TF_COVERAGE forces -O0 -g). Coverage instruments
      # only first-party targets (src/, server/, tests/); FetchContent
      # deps (_deps/**) are excluded from both compile flags and gcovr
      # filters to keep the % honest.
      #
      # `--fail-under-line 50` enforces the project-wide line-coverage
      # floor. Baseline (Phase 6 measurement) was 59%, so the gate has
      # headroom; if a future change drops below 50%, CI goes red.
      #
      # gcovr is installed via pip (user-site) rather than apt so the
      # workflow works on any Debian-family runner regardless of whether
      # the maintainer pre-installed `gcovr` via apt. The pip path also
      # gives us a recent gcovr (≥8.x) which handles GCC 13's gcov output
      # cleanly.
      # ----------------------------------------------------------------
      - name: Install gcovr
        run: pip install --user gcovr

      - name: Coverage report
        run: |
          cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug -DTF_COVERAGE=ON
          cmake --build build-cov -j 1
          cd build-cov && ctest --output-on-failure
          cd ..
          gcovr -r . --filter 'src/' --filter 'server/' \
            --exclude '_deps' --exclude 'tests/' \
            --txt --xml coverage.xml --html-details coverage.html \
            --fail-under-line 50
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          gcovr -r . --filter 'src/' --filter 'server/' \
            --exclude '_deps' --exclude 'tests/' --txt \
            >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.html
            coverage*.html
          if-no-files-found: warn
